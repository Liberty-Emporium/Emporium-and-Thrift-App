{% extends "base.html" %}

{% block title %}AI Listings | {{ store_name }}{% endblock %}

{% block content %}
<div class="ai-listings">
    <h1>📝 Multi-Platform Listings</h1>
    <div class="product-info">
        <h3>{{ product.Title }}</h3>
        <p class="price">${{ product.Price }}</p>
    </div>
    <p>AI-generated listings coming soon!</p>
    <a href="{{ url_for('view_product', sku=product.SKU) }}" class="btn">← Back</a>
</div>

<style>
.ai-listings { max-width: 800px; margin: 0 auto; padding: 2rem; }
.product-info { background: #f8f8f8; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; }
.price { font-size: 1.5rem; font-weight: 700; color: #8B0000; }
</style>
{% endblock %}
