{% extends "base.html" %}

{% block title %}AI Email | {{ store_name }}{% endblock %}

{% block content %}
<style>
  @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900family=DM+Sans:wght@300;400;500display=swap");
</style>
<div class="ai-email">
    <h1>📧 AI Email Draft</h1>
    <form method="POST">
        <select name="purpose">
            <option value="vendor">Contact Vendor</option>
            <option value="customer">Reply to Customer</option>
            <option value="pickup">Schedule Pickup</option>
            <option value="thankyou">Thank You</option>
        </select>
        <textarea name="details" rows="4" placeholder="What do you want to say?"></textarea>
        <button type="submit" class="btn btn-primary" style="background:#8B0000;border-radius:25px;padding:0.6rem 1.5rem;">Generate</button>
    </form>
    {% if email %}
    <pre>{{ email }}</pre>
    {% endif %}
</div>

<style>
.ai-email { max-width: 600px; margin: 0 auto; padding: 2rem; }
.ai-email textarea { width: 100%; padding: 0.75rem; margin: 1rem 0; border: 1px solid #ddd; border-radius: 4px; }
</style>
{% endblock %}
